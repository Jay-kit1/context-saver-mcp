interface:
  display_name: "Context Saver MCP"
  short_description: "Smart default context prep, web search, URL extraction, and compression for Codex"
  default_prompt: "Use $context-saver-mcp as the default context preparation layer. Call the single MCP tool context_saver_prepare when available. For matching tasks this is mandatory before the main work, not optional. Infer one of four modes from intent: project for local coding, review, debugging, repo orientation, multi-file/file/archive extraction, or token-saving context work; search for optional web search plus compression when the user asks to search the web, look up current/latest info, find docs, compare options, or gather external research; url for optional webpage extraction plus compression when the user gives a URL or asks to read, extract, or summarize a webpage/link; doctor for setup, API key, MCP install/default activation, or DeepSeek usage checks. If external DeepSeek compression is blocked by safety or secrets policy, fall back to safe local context preparation and continue. Do not ask the user to choose these modes unless the request is genuinely ambiguous."

policy:
  allow_implicit_invocation: true
